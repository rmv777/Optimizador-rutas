<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enrutador de Técnicos — Google Maps</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #areaMapa { width: 100%; height: 400px; background: #eee; }
        .container { padding: 20px; }
        .direccion-item { display: flex; justify-content: space-between; padding: 8px; background: #f8f9fa; margin-bottom: 5px; border-radius: 5px; }
        .numero { font-weight: bold; color: #667eea; }
        .distancia { color: #28a745; font-weight: bold; }
        .mensaje { padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .exito { background: #d4edda; color: #155724; }
        .advertencia { background: #fff3cd; color: #856404; }
        .info { background: #cce5ff; color: #004085; }
    </style>

    <!-- GOOGLE MAPS -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa7ThD8Quf93jq-obv3pDzini3wVx1QVQ&libraries=places"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<div id="areaMapa"></div>

<div class="container">
    <h2>Enrutador de Técnicos (Google Maps)</h2>

    <textarea id="entradaDirecciones" rows="6" style="width:100%;" placeholder="Pega aquí las direcciones..."></textarea>
    <br><br>
    <button onclick="document.getElementById('inputImagen').click()">Cargar imagen (OCR)</button>
    <input type="file" id="inputImagen" accept="image/*" style="display:none" onchange="procesarImagenOCR(event)">


    <button onclick="procesarEntrada()">Procesar direcciones</button>
    <button id="botonOptimizar" onclick="generarRutaOptima()" disabled>Optimizar ruta</button>
    <button onclick="limpiarTodasDirecciones()">Limpiar todas</button>
    
    <!-- NUEVO: recálculo tras editar -->
    <button onclick="recalcularDistanciasEditadas()">Recalcular distancias</button>
    
    <br><br>
    
    <!-- NUEVO: tiempo de parada -->
    <label>Minutos de parada en cada dirección: 
        <input type="number" id="minutosParada" value="60" min="0" style="width:60px;">
    </label>
    <button onclick="recalcularTiempos()">Recalcular tiempos</button>


    
    <h3>Direcciones procesadas (<span id="numeroDirecciones">0</span>)</h3>
    <div id="listaDirecciones"></div>
    <h3>Hoja de ruta detallada</h3>
<table id="tablaRuta" style="width:100%; border-collapse:collapse; font-size:14px;">
    <thead>
        <tr style="background:#f1f3f5;">
            <th style="border:1px solid #dee2e6; padding:4px;">#</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Dirección</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Km desde origen</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Min desde origen</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Km desde anterior</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Min desde anterior</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Km acumulados</th>
            <th style="border:1px solid #dee2e6; padding:4px;">Min acumulados</th>
        </tr>
    </thead>
    <tbody id="tablaRutaBody"></tbody>
</table>

    
    <h3>Estadísticas</h3>
    <p>Distancia total: <span id="distanciaTotal">-- km</span></p>
    <p>Tiempo total: <span id="tiempoTotal">-- min</span></p>
</div>

<script>
/* ============================================================
   GOOGLE MAPS — INICIALIZACIÓN
============================================================ */
let mapaGoogle;
let marcadores = [];
let directionsService;
let directionsRenderer;

function inicializarMapa() {
    mapaGoogle = new google.maps.Map(document.getElementById("areaMapa"), {
        center: { lat: 37.4167, lng: -6.0833 }, // Valencina
        zoom: 10,
        mapTypeId: "roadmap"
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
        map: mapaGoogle
    });
}

/* ============================================================
   BACKEND — DISTANCIA REAL
============================================================ */
async function obtenerDistanciaReal(origen, destino) {
    try {
        const respuesta = await fetch("https://optimizador-rutas-29sa.onrender.com/distancia", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ origen, destino })
        });

        const datos = await respuesta.json();
        return datos.distancia; // metros
    } catch (error) {
        console.error("Error al obtener distancia real:", error);
        return null;
    }
}

/* ============================================================
   PROCESAMIENTO DE DIRECCIONES
============================================================ */
let listaDirecciones = [];
let distanciaUltimaAValencina = null;


async function calcularDistanciaRealGPS(texto) {
    const textoLimpio = texto.toLowerCase().replace(/[^\w\s]/g, ' ').trim();

    const coordenadasCiudades = {
        "valencina": { lat: 37.4167, lng: -6.0833 },
        "sevilla": { lat: 37.3891, lng: -5.9845 },
        "dos hermanas": { lat: 37.2829, lng: -5.9209 },
        "alcala de guadaira": { lat: 37.3374, lng: -5.8399 },
        "mairena del aljarafe": { lat: 37.3446, lng: -6.0639 }
        // ...
    };

    let ciudadEncontrada = Object.keys(coordenadasCiudades).find(c =>
        textoLimpio.includes(c)
    );

    if (!ciudadEncontrada) {
        return {
            texto,
            ciudad: null,
            coords: null,
            distanciaDesdeValencina: 100, // fallback
        };
    }

    const origen = coordenadasCiudades["valencina"];
    const destino = coordenadasCiudades[ciudadEncontrada];

    const metros = await obtenerDistanciaReal(origen, destino);
    const km = Math.round(metros / 1000);

    return {
        texto,
        ciudad: ciudadEncontrada,
        coords: destino,
        distanciaDesdeValencina: km
    };
}


async function procesarDireccionesReales(lista) {
    listaDirecciones = [];

    // 1) Distancia desde Valencina a cada dirección
    const resultados = [];
    for (let i = 0; i < lista.length; i++) {
        const info = await calcularDistanciaRealGPS(lista[i]);
        resultados.push(info);
    }

    // 2) Ordenar de más lejos a más cerca
    resultados.sort((a, b) => b.distanciaDesdeValencina - a.distanciaDesdeValencina);

    // 3) Calcular distancias entre direcciones consecutivas
    const coordenadasCiudades = {
        "valencina": { lat: 37.4167, lng: -6.0833 },
        "sevilla": { lat: 37.3891, lng: -5.9845 },
        "dos hermanas": { lat: 37.2829, lng: -5.9209 },
        "alcala de guadaira": { lat: 37.3374, lng: -5.8399 },
        "mairena del aljarafe": { lat: 37.3446, lng: -6.0639 }
        // mismo mapa que antes
    };

    const velocidadKmH = 60; // puedes cambiarlo
    const minutosPorKm = 60 / velocidadKmH;

    for (let i = 0; i < resultados.length; i++) {
        let distanciaDesdeAnterior = 0;

        if (i > 0 && resultados[i - 1].coords && resultados[i].coords) {
            const metros = await obtenerDistanciaReal(
                resultados[i - 1].coords,
                resultados[i].coords
            );
            distanciaDesdeAnterior = Math.round(metros / 1000);
        }

        const distanciaDesdeValencina = resultados[i].distanciaDesdeValencina;

        listaDirecciones.push({
            id: Date.now() + i,
            texto: resultados[i].texto,
            ciudad: resultados[i].ciudad,
            coords: resultados[i].coords,
            distanciaDesdeValencina,
            distanciaDesdeAnterior,
            tiempoDesdeValencina: Math.round(distanciaDesdeValencina * minutosPorKm),
            tiempoDesdeAnterior: Math.round(distanciaDesdeAnterior * minutosPorKm)
        });
    }

    // 4) Distancia última dirección → Valencina
    distanciaUltimaAValencina = null;
    if (listaDirecciones.length > 0 && listaDirecciones.at(-1).coords) {
        const metros = await obtenerDistanciaReal(
            listaDirecciones.at(-1).coords,
            coordenadasCiudades["valencina"]
        );
        distanciaUltimaAValencina = Math.round(metros / 1000);
    }

    mostrarDirecciones();
    actualizarContadores();
    actualizarEstadisticas();
    document.getElementById("botonOptimizar").disabled = listaDirecciones.length === 0;
}


function procesarEntrada() {
    const texto = document.getElementById("entradaDirecciones").value.trim();
    if (!texto) return;

    const lineas = texto.split("\n").map(l => l.trim()).filter(l => l.length > 0);
    procesarDireccionesReales(lineas);
}

   async function procesarImagenOCR(event) {
    const archivo = event.target.files[0];
    if (!archivo) return;

    mostrarMensaje("Procesando imagen con OCR...", "info");

    try {
        const resultado = await Tesseract.recognize(
            archivo,
            'spa', // español
            { logger: m => console.log(m) }
        );

        const texto = resultado.data.text;
        console.log("OCR detectado:", texto);

        // Convertir OCR en líneas limpias
        const lineas = texto
            .split("\n")
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lineas.length === 0) {
            mostrarMensaje("No se detectaron direcciones en la imagen", "advertencia");
            return;
        }

        mostrarMensaje("Direcciones detectadas. Procesando...", "exito");

        // Procesar direcciones reales con tu backend
        await procesarDireccionesReales(lineas);

    } catch (error) {
        console.error("Error OCR:", error);
        mostrarMensaje("Error procesando la imagen", "advertencia");
    }
}

    // Recalcular Distancias Editadas
async function recalcularDistanciasEditadas() {
    const inputs = document.querySelectorAll(".direccion-editable");
    const nuevas = Array.from(inputs).map(i => i.value.trim()).filter(t => t.length > 0);

    if (nuevas.length === 0) {
        mostrarMensaje("No hay direcciones para recalcular", "advertencia");
        return;
    }

    mostrarMensaje("Recalculando distancias...", "info");
    await procesarDireccionesReales(nuevas);
    mostrarMensaje("Distancias recalculadas", "exito");
}
    
/* ============================================================
   GOOGLE MAPS — RUTA
============================================================ */
function dibujarRuta(origen, destino) {
    directionsService.route(
        {
            origin,
            destination,
            travelMode: google.maps.TravelMode.DRIVING
        },
        (result, status) => {
            if (status === "OK") {
                directionsRenderer.setDirections(result);
            }
        }
    );
}

function generarRutaOptima() {
    if (listaDirecciones.length === 0) return;

    const origen = { lat: 37.4167, lng: -6.0833 }; // Valencina
    const destino = origen;

    dibujarRuta(origen, destino);

    mostrarMensaje("Ruta optimizada generada", "exito");
}

/* ============================================================
   INTERFAZ
============================================================ */
function mostrarDirecciones() {
    const cont = document.getElementById("listaDirecciones");
    const tbody = document.getElementById("tablaRutaBody");

    cont.innerHTML = "";
    tbody.innerHTML = "";

    let kmAcumulados = 0;
    let minAcumulados = 0;

    listaDirecciones.forEach((d, i) => {
        // Bloque visual editable
        const distanciaPrincipal = 
            i === 0 
                ? `${d.distanciaDesdeValencina} km desde Valencina`
                : `${d.distanciaDesdeAnterior} km desde la anterior`;

        const tiempoPrincipal =
            i === 0
                ? `${d.tiempoDesdeValencina} min desde Valencina`
                : `${d.tiempoDesdeAnterior} min desde la anterior`;

        cont.innerHTML += `
            <div class="direccion-item" data-id="${d.id}">
                <div class="numero">${i + 1}</div>
                <div style="flex:1;">
                    <input type="text" class="direccion-editable" data-index="${i}"
                           value="${d.texto}" style="width:100%;">
                    <div style="font-size:12px; color:#555; margin-top:4px;">
                        <strong>${distanciaPrincipal}</strong><br>
                        <span>${tiempoPrincipal}</span>
                    </div>
                </div>
            </div>
        `;

        // Datos para la tabla profesional
        const kmDesdeOrigen = i === 0 ? d.distanciaDesdeValencina : d.distanciaDesdeValencina;
        const minDesdeOrigen = i === 0 ? d.tiempoDesdeValencina : d.tiempoDesdeValencina;
        const kmDesdeAnterior = i === 0 ? 0 : d.distanciaDesdeAnterior;
        const minDesdeAnterior = i === 0 ? 0 : d.tiempoDesdeAnterior;

        kmAcumulados += kmDesdeAnterior || kmDesdeOrigen;
        minAcumulados += minDesdeAnterior || minDesdeOrigen;

        const fila = document.createElement("tr");
        fila.innerHTML = `
            <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${i + 1}</td>
            <td style="border:1px solid #dee2e6; padding:4px;">${d.texto}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${kmDesdeOrigen}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${minDesdeOrigen}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${kmDesdeAnterior}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${minDesdeAnterior}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${kmAcumulados}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${minAcumulados}</td>
        `;
        tbody.appendChild(fila);
    });

    // Última → Valencina en la tabla
    if (distanciaUltimaAValencina != null && listaDirecciones.length > 0) {
        kmAcumulados += distanciaUltimaAValencina;
        minAcumulados += distanciaUltimaAValencina; // 1 km = 1 min con 60 km/h

        const filaVuelta = document.createElement("tr");
        filaVuelta.style.background = "#f8f9fa";
        filaVuelta.innerHTML = `
            <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">↩</td>
            <td style="border:1px solid #dee2e6; padding:4px;">Vuelta a Valencina</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">-</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">-</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${distanciaUltimaAValencina}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${distanciaUltimaAValencina}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${kmAcumulados}</td>
            <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${minAcumulados}</td>
        `;
        tbody.appendChild(filaVuelta);
    }
}




function actualizarContadores() {
    document.getElementById("numeroDirecciones").textContent = listaDirecciones.length;
}

function limpiarTodasDirecciones() {
    listaDirecciones = [];
    mostrarDirecciones();
    actualizarContadores();
    document.getElementById("botonOptimizar").disabled = true;
    mostrarMensaje("Direcciones eliminadas", "info");
}

function mostrarMensaje(texto, tipo) {
    const msg = document.createElement("div");
    msg.className = `mensaje ${tipo}`;
    msg.textContent = texto;

    document.querySelector(".container").prepend(msg);

    setTimeout(() => msg.remove(), 3000);
}

function actualizarEstadisticas() {
    let distanciaTotal = 0;
    let tiempoDesplazamiento = 0;

    listaDirecciones.forEach(d => {
        distanciaTotal += d.distanciaDesdeAnterior || d.distanciaDesdeValencina;
        tiempoDesplazamiento += d.tiempoDesdeAnterior || d.tiempoDesdeValencina;
    });

    if (distanciaUltimaAValencina != null) {
        distanciaTotal += distanciaUltimaAValencina;
        tiempoDesplazamiento += distanciaUltimaAValencina; // 1 km = 1 min con 60 km/h
    }

    const minutosParada = parseInt(document.getElementById("minutosParada").value || "60", 10);
    const tiempoParadas = listaDirecciones.length * minutosParada;
    const tiempoTotal = tiempoDesplazamiento + tiempoParadas;

    document.getElementById("distanciaTotal").textContent = distanciaTotal + " km";
    document.getElementById("tiempoTotal").textContent = tiempoTotal + " min";
}

function recalcularTiempos() {
    actualizarEstadisticas();
    mostrarMensaje("Tiempos recalculados con el nuevo tiempo de parada", "info");
}



/* ============================================================
   INICIO
============================================================ */
document.addEventListener("DOMContentLoaded", inicializarMapa);
</script>

</body>
</html>
