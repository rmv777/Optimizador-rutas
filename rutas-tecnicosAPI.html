<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Enrutador de Técnicos — OCR + Distancia a Valencina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}
header {
    background: #0078ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}
.container {
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
}
button {
    padding: 10px 15px;
    background: #0078ff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px 0;
}
button:hover {
    background: #005fcc;
}
#lista-direcciones li {
    background: #fafafa;
    padding: 8px;
    margin: 4px 0;
    border-radius: 4px;
    list-style: none;
    border: 1px solid #ddd;
}
#lista-direcciones span.dist {
    font-size: 12px;
    color: #555;
}
#map {
    width: 100%;
    height: 450px;
    margin-top: 20px;
    border: 2px solid #ccc;
    border-radius: 4px;
}
.mensaje {
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}
.info { background: #d9edf7; }
.exito { background: #dff0d8; }
.advertencia { background: #f2dede; }
</style>
</head>

<body>

<header>Enrutador de Técnicos — OCR + Distancia a Valencina</header>

<div class="container">

    <button onclick="document.getElementById('inputImagen').click()">Cargar imagen (OCR)</button>
    <input type="file" id="inputImagen" accept="image/*" style="display:none" onchange="procesarImagenOCR(event)">

    <div id="mensaje"></div>

    <h3>Direcciones ordenadas por distancia a Valencina de la Concepción (de más lejos a más cerca)</h3>
    <ul id="lista-direcciones"></ul>

    <h3>Mapa</h3>
    <div id="map"></div>

</div>

<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa7ThD8Quf93jq-obv3pDzini3wVx1QVQ&libraries=places"></script>

<!-- TESSERACT -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
const ORIGEN_FIJO = "Valencina de la Concepción, Sevilla, España";

let map;
let bounds;
let markers = [];

function mostrarMensaje(texto, tipo) {
    const div = document.getElementById("mensaje");
    div.className = "mensaje " + tipo;
    div.textContent = texto;
}

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.417, lng: -6.072 }, // aprox. Valencina
        zoom: 10
    });

    bounds = new google.maps.LatLngBounds();

    // Marcador del origen fijo
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ address: ORIGEN_FIJO }, (results, status) => {
        if (status === "OK" && results[0]) {
            const pos = results[0].geometry.location;
            new google.maps.Marker({
                map,
                position: pos,
                label: "V",
                title: ORIGEN_FIJO
            });
            bounds.extend(pos);
            map.fitBounds(bounds);
        }
    });

    mostrarMensaje("Mapa cargado. Sube una imagen para obtener direcciones por OCR.", "info");
}

window.onload = initMap;

// OCR
async function procesarImagenOCR(event) {
    const archivo = event.target.files[0];
    if (!archivo) return;

    mostrarMensaje("Procesando imagen con OCR...", "info");

    try {
        const resultado = await Tesseract.recognize(
            archivo,
            'spa',
            { logger: m => console.log(m) }
        );

        const texto = resultado.data.text;
        console.log("OCR detectado:", texto);

        const lineas = texto
            .split("\n")
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lineas.length === 0) {
            mostrarMensaje("No se detectaron direcciones en la imagen", "advertencia");
            return;
        }

        mostrarMensaje("Direcciones detectadas. Calculando distancias a Valencina...", "info");

        calcularDistanciasYOrdenar(lineas);

    } catch (error) {
        console.error("Error OCR:", error);
        mostrarMensaje("Error procesando la imagen", "advertencia");
    }
}

// Distancias a Valencina usando Distance Matrix
function calcularDistanciasYOrdenar(direcciones) {
    const service = new google.maps.DistanceMatrixService();

    service.getDistanceMatrix(
        {
            origins: [ORIGEN_FIJO],
            destinations: direcciones,
            travelMode: google.maps.TravelMode.DRIVING,
            unitSystem: google.maps.UnitSystem.METRIC
        },
        (response, status) => {
            if (status !== "OK") {
                console.error("Error DistanceMatrix:", status, response);
                mostrarMensaje("Error calculando distancias: " + status, "advertencia");
                return;
            }

            const results = response.rows[0].elements;
            const datos = [];

            for (let i = 0; i < results.length; i++) {
                const el = results[i];
                if (el.status === "OK") {
                    datos.push({
                        direccion: direcciones[i],
                        distanciaTexto: el.distance.text,
                        distanciaValor: el.distance.value, // en metros
                        duracionTexto: el.duration.text
                    });
                }
            }

            if (datos.length === 0) {
                mostrarMensaje("No se pudieron calcular distancias válidas.", "advertencia");
                return;
            }

            // Ordenar de más lejos a más cerca
            datos.sort((a, b) => b.distanciaValor - a.distanciaValor);

            mostrarMensaje("Direcciones ordenadas por distancia a Valencina (de más lejos a más cerca).", "exito");

            pintarListaYMapa(datos);
        }
    );
}

function limpiarMarcadores() {
    markers.forEach(m => m.setMap(null));
    markers = [];
    bounds = new google.maps.LatLngBounds();
}

function pintarListaYMapa(datos) {
    const lista = document.getElementById("lista-direcciones");
    lista.innerHTML = "";
    limpiarMarcadores();

    const geocoder = new google.maps.Geocoder();

    datos.forEach((item, idx) => {
        const li = document.createElement("li");
        li.innerHTML = `
            <strong>${idx + 1}. ${item.direccion}</strong><br>
            <span class="dist">
