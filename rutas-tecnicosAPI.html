<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Optimizador de Rutas DANKESOL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}
header {
    background: #0078ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}
.container {
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
}
button {
    padding: 10px 15px;
    background: #0078ff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px 0;
}
button:hover {
    background: #005fcc;
}
#lista-direcciones li {
    background: #fafafa;
    padding: 8px;
    margin: 4px 0;
    border-radius: 4px;
    list-style: none;
    border: 1px solid #ddd;
}
#lista-direcciones span.dist {
    font-size: 12px;
    color: #555;
}
#map {
    width: 100%;
    height: 450px;
    margin-top: 20px;
    border: 2px solid #ccc;
    border-radius: 4px;
}
.mensaje {
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}
.info { background: #d9edf7; }
.exito { background: #dff0d8; }
.advertencia { background: #f2dede; }

@keyframes parpadeo {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

</style>
</head>

<body>

<header>Enrutador de Técnicos — OCR + Distancia a Valencina</header>

<div class="container">

    <button onclick="document.getElementById('inputImagen').click()">Cargar imagen (OCR)</button>
    <input type="file" id="inputImagen" accept="image/*" style="display:none" onchange="procesarImagenOCR(event)">
    
    <div id="mensaje"></div>
    <div id="ocr-loading" style="
    display:none;
    margin-top:10px;
    padding:10px;
    background:#fff3cd;
    border:1px solid #ffeeba;
    color:#856404;
    font-weight:bold;
    border-radius:5px;
    animation: parpadeo 1s infinite;
    ">
        ⏳ Procesando imagen con OCR...
    </div>

    <h3>Direcciones ordenadas por distancia a Valencina de la Concepción (de más lejos a más cerca)</h3>
    <div id="lista-direcciones"></div>
    <button id="btn-recalcular">Recalcular ruta</button>
    <button id="btn-exportar">Exportar ruta a Google Maps</button>
    <button id="btn-anadir" style="margin-top: 10px; padding: 10px; font-size: 16px;">
    Añadir dirección
    </button>
    
    <button id="btn-eliminar" style="margin-top: 10px; padding: 10px; font-size: 16px;">
        Eliminar última dirección
    </button>

    <h3>Mapa</h3>
    <div id="map"></div>

</div>
    
<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa7ThD8Quf93jq-obv3pDzini3wVx1QVQ&libraries=places"></script>

<!-- TESSERACT -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
const ORIGEN_FIJO = "Valencina de la Concepción, Sevilla, España";
let map;
let bounds;
let markers = [];

let rutaPolyline = null;


function mostrarMensaje(texto, tipo) {
    const div = document.getElementById("mensaje");
    div.className = "mensaje " + tipo;
    div.textContent = texto;
}

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.417, lng: -6.072 },
        zoom: 10
    });

    bounds = new google.maps.LatLngBounds();
}

window.onload = initMap;

async function procesarImagenOCR(event) {
    const archivo = event.target.files[0];
    if (!archivo) return;

    // Mostrar indicador de carga
    document.getElementById("ocr-loading").style.display = "block";

    try {
        const resultado = await Tesseract.recognize(
            archivo,
            'spa',
            { logger: m => console.log(m) }
        );

        // Ocultar indicador
        document.getElementById("ocr-loading").style.display = "none";

        const texto = resultado.data.text;

        const lineas = texto
            .split("\n")
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lineas.length === 0) {
            mostrarMensaje("No se detectaron direcciones en la imagen", "advertencia");
            return;
        }

        calcularDistanciasDesdeValencina(
            lineas.map(d => ({ direccion: d }))
        );

    } catch (error) {
        console.error("Error OCR:", error);
        mostrarMensaje("Error procesando la imagen", "advertencia");

        // Ocultar indicador si hay error
        document.getElementById("ocr-loading").style.display = "none";
    }
}



function calcularDistanciasDesdeValencina(listaDirecciones) {
    const service = new google.maps.DistanceMatrixService();

    // Usamos SOLO las direcciones que vienen del parámetro
    const destinos = listaDirecciones.map(d => d.direccion);

    service.getDistanceMatrix(
        {
            origins: [ORIGEN_FIJO],
            destinations: destinos,
            travelMode: google.maps.TravelMode.DRIVING,
            unitSystem: google.maps.UnitSystem.METRIC,
        },
        (response, status) => {
            if (status !== "OK") {
                mostrarMensaje("Error calculando distancias: " + status, "advertencia");
                return;
            }

            // Construimos el array con distancias
            const datos = destinos.map((dir, idx) => {
                const el = response.rows[0].elements[idx];
                return {
                    direccion: dir,
                    distanciaTexto: el.distance.text,
                    duracionTexto: el.duration.text,
                    distanciaValor: el.distance.value,
                    duracionValor: el.duration.value,
                };
            });

            // ORDENAR (de más lejos a más cerca)
            datos.sort((a, b) => b.distanciaValor - a.distanciaValor);

            // Pintar lista y mapa con el nuevo orden
            pintarListaYMapa(datos);
        }
    );
}

function limpiarMarcadores() {
    markers.forEach(m => m.setMap(null));
    markers = [];
    bounds = new google.maps.LatLngBounds();
}

function dibujarRutaCompleta(puntos) {
    // Si ya existe una ruta dibujada, la eliminamos
    if (rutaPolyline) {
        rutaPolyline.setMap(null);
    }

    rutaPolyline = new google.maps.Polyline({
        path: puntos,
        geodesic: true,
        strokeColor: "#0078ff",
        strokeOpacity: 0.9,
        strokeWeight: 5,
    });

    rutaPolyline.setMap(map);
}


async function pintarListaYMapa(datos) {
    const lista = document.getElementById("lista-direcciones");
    lista.innerHTML = "";
    limpiarMarcadores();

    const geocoder = new google.maps.Geocoder();
    const service = new google.maps.DistanceMatrixService();

    function calcularTramo(origen, destino) {
        return new Promise((resolve, reject) => {
            service.getDistanceMatrix(
                {
                    origins: [origen],
                    destinations: [destino],
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.METRIC,
                },
                (response, status) => {
                    if (status !== "OK") return reject(status);
                    const el = response.rows[0].elements[0];
                    if (el.status !== "OK") return reject(el.status);
                    resolve({
                        distanciaTexto: el.distance.text,
                        distanciaValor: el.distance.value,
                        duracionTexto: el.duration.text,
                        duracionValor: el.duration.value,
                    });
                }
            );
        });
    }

    // Construimos paradas: ORIGEN_FIJO + direcciones + ORIGEN_FIJO
    const paradas = [ORIGEN_FIJO, ...datos.map(d => d.direccion), ORIGEN_FIJO];

    let totalDistancia = 0;
    let totalDuracion = 0;

    for (let i = 1; i < paradas.length - 1; i++) {
        const origen = paradas[i - 1];
        const destino = paradas[i];

        const infoTramo = await calcularTramo(origen, destino);

        totalDistancia += infoTramo.distanciaValor;
        totalDuracion += infoTramo.duracionValor;

        if (i < paradas.length - 1) {
            const item = datos[i - 1];
            const li = document.createElement("li");

            // Necesario para Sortable
            li.dataset.id = i - 1;

            let html = `
                <strong>${i}.</strong>
                <input type="text" class="direccion-editable" value="${item.direccion}" style="width: 70%; margin-bottom: 5px;">
                <button class="btn-eliminar" style="margin-left: 10px; color: white; background: red; border: none; padding: 4px 8px; cursor: pointer;">
                    X
                </button>
                <br>
            `;

            if (i === 1) {
                html += `<span class="dist"><strong>Desde Valencina → primera:</strong> ${infoTramo.distanciaTexto} (${infoTramo.duracionTexto})</span>`;
            } else {
                html += `<span class="dist"><strong>Desde la anterior:</strong> ${infoTramo.distanciaTexto} (${infoTramo.duracionTexto})</span>`;
            }

            li.innerHTML = html;
            lista.appendChild(li);
        }
    }

    // Último tramo: última dirección → Valencina
    const infoUltimo = await calcularTramo(paradas[paradas.length - 2], paradas[paradas.length - 1]);
    totalDistancia += infoUltimo.distanciaValor;
    totalDuracion += infoUltimo.duracionValor;

    const liUltimo = document.createElement("li");
    liUltimo.innerHTML = `
        <strong>Vuelta a Valencina:</strong> ${infoUltimo.distanciaTexto} (${infoUltimo.duracionTexto})
    `;
    lista.appendChild(liUltimo);

    // Totales
    const totalKm = (totalDistancia / 1000).toFixed(2);
    const horas = Math.floor(totalDuracion / 3600);
    const minutos = Math.floor((totalDuracion % 3600) / 60);

    const liTotal = document.createElement("li");
    liTotal.innerHTML = `
        <strong>Total Km:</strong> ${totalKm} km<br>
        <strong>Total Tiempo:</strong> ${horas} h ${minutos} min
    `;
    liTotal.style.background = "#dff0d8";
    liTotal.style.padding = "10px";
    liTotal.style.marginTop = "10px";
    liTotal.style.border = "2px solid #b2d8b2";

    lista.appendChild(liTotal);

    // -----------------------------
    // GEOCODIFICACIÓN Y MAPA
    // -----------------------------

    const coordenadasRuta = [];
    const bounds = new google.maps.LatLngBounds();

    // Geocodificar direcciones
    await Promise.all(
        datos.map((item, idx) => {
            return new Promise((resolve) => {
                geocoder.geocode({ address: item.direccion }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        const pos = results[0].geometry.location;
                        coordenadasRuta[idx] = pos;

                        const marker = new google.maps.Marker({
                            map,
                            position: pos,
                            label: String(idx + 1),
                            title: item.direccion,
                        });

                        markers.push(marker);
                        bounds.extend(pos);
                    }
                    resolve();
                });
            });
        })
    );

    // Geocodificar Valencina
    await new Promise((resolve) => {
        geocoder.geocode({ address: ORIGEN_FIJO }, (results, status) => {
            if (status === "OK" && results[0]) {
                const origen = results[0].geometry.location;
                coordenadasRuta.unshift(origen);
                coordenadasRuta.push(origen);
                bounds.extend(origen);
                dibujarRutaCompleta(coordenadasRuta);
            }
            resolve();
        });
    });

    map.fitBounds(bounds);
}

    // Recalcular
    document.getElementById("btn-recalcular").addEventListener("click", () => {
    // Leer todas las direcciones editadas
    const inputs = document.querySelectorAll(".direccion-editable");
    const nuevasDirecciones = [];

    inputs.forEach(input => {
        nuevasDirecciones.push({
            direccion: input.value.trim()
        });
    });

    // Volver a calcular distancias desde Valencina
    calcularDistanciasDesdeValencina(nuevasDirecciones);
});
    // Exportar
    document.getElementById("btn-exportar").addEventListener("click", () => {
    const inputs = document.querySelectorAll(".direccion-editable");

    // Leer direcciones en el orden actual
    const direcciones = Array.from(inputs).map(input => input.value.trim());

    if (direcciones.length === 0) {
        mostrarMensaje("No hay direcciones para exportar", "advertencia");
        return;
    }

    // Construir URL de Google Maps
    const origen = encodeURIComponent(ORIGEN_FIJO);
    const waypoints = direcciones.map(d => encodeURIComponent(d)).join("/");

    const url = `https://www.google.com/maps/dir/${origen}/${waypoints}/${origen}`;

    // Abrir en nueva pestaña
    window.open(url, "_blank");
});

    // --- BOTÓN AÑADIR DIRECCIÓN ---
document.getElementById("btn-anadir").addEventListener("click", () => {
    const lista = document.getElementById("lista-direcciones");

    const nuevoLi = document.createElement("li");
    nuevoLi.innerHTML = `
        <strong>+</strong>
        <input type="text" class="direccion-editable" value="" placeholder="Nueva dirección..." style="width: 90%; margin-bottom: 5px;"><br>
    `;

    lista.appendChild(nuevoLi);
});


// --- ELIMINAR DIRECCIÓN INDIVIDUAL ---
document.addEventListener("click", (e) => {
    if (e.target.classList.contains("btn-eliminar")) {
        const li = e.target.closest("li");
        if (li) {
            li.remove();
        }
    }
});


</script>
        <!-- ARRASTRAR Y SOLTAR -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>    

<script>
new Sortable(document.getElementById("lista-direcciones"), {
    animation: 150,
    onEnd: function () {
        console.log("Nuevo orden manual aplicado");
    }
});
</script>
 

</body>
</html>
