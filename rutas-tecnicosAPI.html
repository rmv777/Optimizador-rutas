<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Enrutador de Técnicos — OCR + Distancia a Valencina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}
header {
    background: #0078ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}
.container {
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
}
button {
    padding: 10px 15px;
    background: #0078ff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px 0;
}
button:hover {
    background: #005fcc;
}
#lista-direcciones li {
    background: #fafafa;
    padding: 8px;
    margin: 4px 0;
    border-radius: 4px;
    list-style: none;
    border: 1px solid #ddd;
}
#lista-direcciones span.dist {
    font-size: 12px;
    color: #555;
}
#map {
    width: 100%;
    height: 450px;
    margin-top: 20px;
    border: 2px solid #ccc;
    border-radius: 4px;
}
.mensaje {
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}
.info { background: #d9edf7; }
.exito { background: #dff0d8; }
.advertencia { background: #f2dede; }
</style>
</head>

<body>

<header>Enrutador de Técnicos — OCR + Distancia a Valencina</header>

<div class="container">

    <button onclick="document.getElementById('inputImagen').click()">Cargar imagen (OCR)</button>
    <input type="file" id="inputImagen" accept="image/*" style="display:none" onchange="procesarImagenOCR(event)">

    <div id="mensaje"></div>

    <h3>Direcciones ordenadas por distancia a Valencina de la Concepción (de más lejos a más cerca)</h3>
    <ul id="lista-direcciones"></ul>

    <h3>Mapa</h3>
    <div id="map"></div>

</div>

<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa7ThD8Quf93jq-obv3pDzini3wVx1QVQ&libraries=places"></script>

<!-- TESSERACT -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
const ORIGEN_FIJO = "Valencina de la Concepción, Sevilla, España";
let map;
let bounds;
let markers = [];

let rutaPolyline = null;


function mostrarMensaje(texto, tipo) {
    const div = document.getElementById("mensaje");
    div.className = "mensaje " + tipo;
    div.textContent = texto;
}

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.417, lng: -6.072 },
        zoom: 10
    });

    bounds = new google.maps.LatLngBounds();
}

window.onload = initMap;

async function procesarImagenOCR(event) {
    const archivo = event.target.files[0];
    if (!archivo) return;

    mostrarMensaje("Procesando imagen con OCR...", "info");

    try {
        const resultado = await Tesseract.recognize(
            archivo,
            'spa',
            { logger: m => console.log(m) }
        );

        const texto = resultado.data.text;

        const lineas = texto
            .split("\n")
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lineas.length === 0) {
            mostrarMensaje("No se detectaron direcciones en la imagen", "advertencia");
            return;
        }

        calcularDistanciasYOrdenar(lineas);

    } catch (error) {
        console.error("Error OCR:", error);
        mostrarMensaje("Error procesando la imagen", "advertencia");
    }
}

function calcularDistanciasYOrdenar(direcciones) {
    const service = new google.maps.DistanceMatrixService();

    service.getDistanceMatrix(
        {
            origins: [ORIGEN_FIJO],
            destinations: direcciones,
            travelMode: google.maps.TravelMode.DRIVING,
            unitSystem: google.maps.UnitSystem.METRIC
        },
        (response, status) => {
            if (status !== "OK") {
                mostrarMensaje("Error calculando distancias: " + status, "advertencia");
                return;
            }

            const results = response.rows[0].elements;
            const datos = [];

            for (let i = 0; i < results.length; i++) {
                const el = results[i];
                if (el.status === "OK") {
                    datos.push({
                        direccion: direcciones[i],
                        distanciaTexto: el.distance.text,
                        distanciaValor: el.distance.value,
                        duracionTexto: el.duration.text
                    });
                }
            }

            datos.sort((a, b) => b.distanciaValor - a.distanciaValor);

            pintarListaYMapa(datos);
        }
    );
}

function limpiarMarcadores() {
    markers.forEach(m => m.setMap(null));
    markers = [];
    bounds = new google.maps.LatLngBounds();
}

function dibujarRutaCompleta(puntos) {
    // Si ya existe una ruta dibujada, la eliminamos
    if (rutaPolyline) {
        rutaPolyline.setMap(null);
    }

    rutaPolyline = new google.maps.Polyline({
        path: puntos,
        geodesic: true,
        strokeColor: "#0078ff",
        strokeOpacity: 0.9,
        strokeWeight: 5,
    });

    rutaPolyline.setMap(map);
}


function pintarListaYMapa(datos) {
    const lista = document.getElementById("lista-direcciones");
    lista.innerHTML = "";
    limpiarMarcadores();

    const geocoder = new google.maps.Geocoder();
    const service = new google.maps.DistanceMatrixService();

    const origins = [ORIGEN_FIJO, ...datos.map(d => d.direccion)];
    const destinations = [...datos.map(d => d.direccion), ORIGEN_FIJO];

    let totalDistancia = 0;
    let totalDuracion = 0;

    service.getDistanceMatrix(
        {
            origins,
            destinations,
            travelMode: google.maps.TravelMode.DRIVING,
            unitSystem: google.maps.UnitSystem.METRIC,
        },
        (response, status) => {
            if (status !== "OK") {
                mostrarMensaje("Error calculando tramos: " + status, "advertencia");
                return;
            }

            const coordenadasRuta = [];
            let geocodificacionesCompletadas = 0;

            datos.forEach((item, idx) => {
                const li = document.createElement("li");

                let html = `
                    <strong>${idx + 1}. ${item.direccion}</strong><br>
                    Distancia a Valencina: ${item.distanciaTexto} (${item.duracionTexto})
                `;

               // TRAMO INICIAL: Valencina → primera dirección
                if (idx === 0) {
                    const tramo = response.rows[0].elements[0];
                    html += `<br><strong>Desde Valencina → primera:</strong> ${tramo.distance.text} (${tramo.duration.text})`;
                
                    totalDistancia += tramo.distance.value;
                    totalDuracion += tramo.duration.value;
                }
                
                // TRAMOS INTERMEDIOS: dirección anterior → dirección actual
                if (idx > 0) {
                    const tramo = response.rows[idx].elements[idx];
                    html += `<br><strong>Desde la anterior:</strong> ${tramo.distance.text} (${tramo.duration.text})`;
                
                    totalDistancia += tramo.distance.value;
                    totalDuracion += tramo.duration.value;
                }
                
                // TRAMO FINAL: última dirección → Valencina
                if (idx === datos.length - 1) {
                    const tramo = response.rows[idx + 1].elements[idx + 1];
                    html += `<br><strong>Vuelta a Valencina:</strong> ${tramo.distance.text} (${tramo.duration.text})`;
                
                    totalDistancia += tramo.distance.value;
                    totalDuracion += tramo.duration.value;
                }


                li.innerHTML = html;
                lista.appendChild(li);

                // GEOCODIFICACIÓN PARA DIBUJAR RUTA
                geocoder.geocode({ address: item.direccion }, (results, status) => {
                    geocodificacionesCompletadas++;

                    if (status === "OK" && results[0]) {
                        coordenadasRuta[idx] = results[0].geometry.location;

                        const marker = new google.maps.Marker({
                            map,
                            position: coordenadasRuta[idx],
                            label: String(idx + 1),
                            title: item.direccion,
                        });

                        markers.push(marker);
                        bounds.extend(coordenadasRuta[idx]);
                        map.fitBounds(bounds);
                    }

                    // Cuando TODAS las geocodificaciones terminen → dibujar ruta
                    if (geocodificacionesCompletadas === datos.length) {
                        geocoder.geocode({ address: ORIGEN_FIJO }, (res, st) => {
                            if (st === "OK" && res[0]) {
                                const origen = res[0].geometry.location;

                                const rutaFinal = [
                                    origen,
                                    ...coordenadasRuta.filter(Boolean),
                                    origen
                                ];

                                dibujarRutaCompleta(rutaFinal);
                            }
                        });
                    }
                });
            });

            // ⭐⭐⭐ AÑADIMOS LOS TOTALES AQUÍ — SIEMPRE SE EJECUTA ⭐⭐⭐

            const totalKm = (totalDistancia / 1000).toFixed(2);
            const horas = Math.floor(totalDuracion / 3600);
            const minutos = Math.floor((totalDuracion % 3600) / 60);

            const liTotal = document.createElement("li");
            liTotal.innerHTML = `
                <strong>Total Km:</strong> ${totalKm} km<br>
                <strong>Total Tiempo:</strong> ${horas} h ${minutos} min
            `;
            liTotal.style.background = "#dff0d8";
            liTotal.style.padding = "10px";
            liTotal.style.marginTop = "10px";
            liTotal.style.border = "2px solid #b2d8b2";

            lista.appendChild(liTotal);
        }
    );
}





</script>

</body>
</html>
