<style>

        .header-app {
    text-align: center;

        /* Animación del reloj de arena */

        0% { transform: rotate(0deg); }

    .reloj-animado {
        display: inline-block;
        animation: girarArena 1s infinite linear;

    /* Botones principales de acciones */
.botones-acciones {
    display: flex;

}

.boton-accion {

}

/* Colores diferenciados */

}

.boton-exportar {
    background: #17a2b8;
}
.boton-exportar:hover {
    background: #117a8b;
}

/* --- ESTILO GLOBAL --- */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
    padding: 20px;
}

/* Contenedor principal */
.contenedor-principal {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}

/* Títulos */
h2, h3 {
    color: #2c3e50;
    margin-bottom: 12px;
}

/* Secciones tipo tarjeta */
.tarjeta {
    background: #ffffff;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 25px;

/* Botones */
button {

    transition: 0.2s;

/* Inputs */
input[type="text"], input[type="number"], input[type="date"], input[type="file"] {

#map {

/* Tarjetas del clima */
#clima-contenedor {
    display: flex;
    flex-wrap: wrap;

    margin-top: 15px;
}

.tarjeta-clima {
    flex: 1;
    min-width: 180px;
    max-width: 220px;
    padding: 14px;

    box-shadow: 0 3px 10px rgba(0,0,0,0.1);

}
</style>
</head>

<body>

<header class="header-app">
        <h1>Optimizador de Rutas DANKESOL</h1>
</header>

<div class="contenedor-principal">
        <div class="tarjeta">
            <h2>🌦️ Previsión del tiempo</h2>
        
            <label for="fecha-clima" style="font-weight:600;">Seleccionar día:</label><br>
            <input type="date" id="fecha-clima" style="margin-top:8px;">
        
            <button id="btn-clima" class="boton-accion boton-recalcular" style="margin-top:12px;">
                📅 Ver previsión
            </button>
        
            <div id="resultado-clima" style="margin-top:15px;"></div>
        </div>

    <div class="tarjeta">
        <h2>📸 OCR — Cargar direcciones desde imagen</h2>
        <input type="file" id="inputImagen" accept="image/*" onchange="procesarImagenOCR(event)">
       <div id="ocr-loading" style="display:none; margin-top:10px;">
    <span class="reloj-animado">⏳</span> Procesando imagen...
</div>

    </div>

        <div style="margin:10px 0;">
    <label>
        <input type="radio" name="horaSalida" value="7" checked>
        Salida 7:00
    </label>
    <label style="margin-left:20px;">
        <input type="radio" name="horaSalida" value="8">
        Salida 8:00
    </label>
</div>


<div class="tarjeta">
    <h2>📝 Lista de direcciones ordenadas de mas léjos a mas cerca de Valencina</h2>

    <div class="botones-acciones">
        <button id="btn-anadir" class="boton-accion boton-anadir">➕ Añadir dirección</button>
        <button id="btn-recalcular" class="boton-accion boton-recalcular">🔄 Recalcular ruta</button>
        <button id="btn-exportar" class="boton-accion boton-exportar">📤 Exportar a Google Maps</button>
    </div>

    <ul id="lista-direcciones"></ul>
</div>
<div class="tarjeta">
    <h2>🗺️ Mapa de la ruta</h2>
    <div id="map"></div>
</div>


</div>
    
<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa7ThD8Quf93jq-obv3pDzini3wVx1QVQ&libraries=places"></script>

<!-- TESSERACT -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
        function sumarMinutosAHora(horaBase, minutosASumar) {
    const totalMin = horaBase * 60 + minutosASumar;
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${h}:${m.toString().padStart(2, '0')}`;
}
</script>
        
<script>

function formatearHoras(minutosTotales) {
    const horas = Math.floor(minutosTotales / 60);
    const minutos = minutosTotales % 60;
    return `${horas}:${minutos.toString().padStart(2, '0')}`;
}

const ORIGEN_FIJO = "Valencina de la Concepción, Sevilla, España";
let map;
let bounds;
let markers = [];

let rutaPolyline = null;

function iconoClima(code) {
    if (code === 0) return "☀️ Despejado";
    if (code === 1) return "🌤️ Mayormente despejado";
    if (code === 2) return "⛅ Parcialmente nublado";
    if (code === 3) return "☁️ Nublado";
    if (code === 45 || code === 48) return "🌫️ Niebla";
    if ([51,53,55].includes(code)) return "🌦️ Llovizna";
    if ([61,63,65].includes(code)) return "🌧️ Lluvia";
    if ([66,67].includes(code)) return "🌨️ Lluvia helada";
    if ([71,73,75].includes(code)) return "❄️ Nieve";
    if (code === 95) return "⛈️ Tormenta";
    if (code === 96 || code === 99) return "🌩️ Tormenta fuerte";
    return "❓";
}

function mostrarMensaje(texto, tipo) {
    const div = document.getElementById("mensaje");
    div.className = "mensaje " + tipo;
    div.textContent = texto;
}

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.417, lng: -6.072 },
        zoom: 10
    });

    bounds = new google.maps.LatLngBounds();
}

window.onload = initMap;

async function procesarImagenOCR(event) {
    const archivo = event.target.files[0];
    if (!archivo) return;

    // Mostrar indicador de carga
    document.getElementById("ocr-loading").style.display = "block";

    try {
        const resultado = await Tesseract.recognize(
            archivo,
            'spa',
            { logger: m => console.log(m) }
        );

        // Ocultar indicador
        document.getElementById("ocr-loading").style.display = "none";

        const texto = resultado.data.text;

        const lineas = texto
            .split("\n")
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lineas.length === 0) {
            mostrarMensaje("No se detectaron direcciones en la imagen", "advertencia");
            return;
        }

        calcularDistanciasDesdeValencina(
            lineas.map(d => ({ direccion: d }))
        );

    } catch (error) {
        console.error("Error OCR:", error);
        mostrarMensaje("Error procesando la imagen", "advertencia");

        // Ocultar indicador si hay error
        document.getElementById("ocr-loading").style.display = "none";
    }
}



function calcularDistanciasDesdeValencina(listaDirecciones) {
    const service = new google.maps.DistanceMatrixService();

    // Usamos SOLO las direcciones que vienen del parámetro
    const destinos = listaDirecciones.map(d => d.direccion);

    service.getDistanceMatrix(
        {
            origins: [ORIGEN_FIJO],
            destinations: destinos,
            travelMode: google.maps.TravelMode.DRIVING,
            unitSystem: google.maps.UnitSystem.METRIC,
        },
        (response, status) => {
            if (status !== "OK") {
                mostrarMensaje("Error calculando distancias: " + status, "advertencia");
                return;
            }

            // Construimos el array con distancias
                const datos = destinos.map((dir, idx) => {
                    const el = response.rows[0].elements[idx];
                    return {
                        direccion: dir,
                        distanciaTexto: el.distance.text,
                        duracionTexto: el.duration.text,
                        distanciaValor: el.distance.value,
                        duracionValor: el.duration.value,
                        minutos: listaDirecciones[idx].minutos ?? 60,
                        comidaExtra: listaDirecciones[idx].comidaExtra || 0,
                        comida: listaDirecciones[idx].comida || false
                    };
                });



            // ORDENAR (de más lejos a más cerca)
            datos.sort((a, b) => b.distanciaValor - a.distanciaValor);

            // Pintar lista y mapa con el nuevo orden
            pintarListaYMapa(datos);
        }
    );
}

function limpiarMarcadores() {
    markers.forEach(m => m.setMap(null));
    markers = [];
    bounds = new google.maps.LatLngBounds();
}

function dibujarRutaCompleta(puntos) {
    // Si ya existe una ruta dibujada, la eliminamos
    if (rutaPolyline) {
        rutaPolyline.setMap(null);
    }

    rutaPolyline = new google.maps.Polyline({
        path: puntos,
        geodesic: true,
        strokeColor: "#0078ff",
        strokeOpacity: 0.9,
        strokeWeight: 5,
    });

    rutaPolyline.setMap(map);
}


async function pintarListaYMapa(datos) {
    const lista = document.getElementById("lista-direcciones");
    lista.innerHTML = "";
    limpiarMarcadores();

    const geocoder = new google.maps.Geocoder();
    const service = new google.maps.DistanceMatrixService();

    function calcularTramo(origen, destino) {
        return new Promise((resolve, reject) => {
            service.getDistanceMatrix(
                {
                    origins: [origen],
                    destinations: [destino],
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.METRIC,
                },
                (response, status) => {
                    if (status !== "OK") return reject(status);
                    const el = response.rows[0].elements[0];
                    if (el.status !== "OK") return reject(el.status);
                    resolve({
                        distanciaTexto: el.distance.text,
                        distanciaValor: el.distance.value,
                        duracionTexto: el.duration.text,
                        duracionValor: el.duration.value,
                    });
                }
            );
        });
    }

    // Construimos paradas: ORIGEN_FIJO + direcciones + ORIGEN_FIJO
    const paradas = [ORIGEN_FIJO, ...datos.map(d => d.direccion), ORIGEN_FIJO];

    let totalDistancia = 0;
    let totalDuracion = 0;


        // === HORA DE SALIDA ===
        const salidaSeleccionada = parseInt(document.querySelector('input[name="horaSalida"]:checked')?.value || 7);
        let minutosAcumulados = 0;


        
    for (let i = 1; i < paradas.length - 1; i++) {
        const origen = paradas[i - 1];
        const destino = paradas[i];

        const infoTramo = await calcularTramo(origen, destino);

         // Minutos extra reales del técnico
        const minutosExtra = datos[i - 1].minutos ?? 0;
        
        // Minutos de comida si vienen marcados
        const comidaExtra = datos[i - 1].comidaExtra || 0;
        
        // Sumar ambos al tramo
        infoTramo.duracionValor += (minutosExtra + comidaExtra) * 60;
        
        // Actualizar texto en formato h:mm
        const duracionTotalMin = Math.round(infoTramo.duracionValor / 60);
            
            // Calcular hora de llegada
        const horaLlegada = sumarMinutosAHora(parseInt(salidaSeleccionada), infoTramo.minutosAcumulados);
        
        // Calcular hora de salida (llegada + permanencia)
        const permanencia = duracionTotalMin; 
        const horaSalida = sumarMinutosAHora(parseInt(salidaSeleccionada), infoTramo.minutosAcumulados + permanencia);

        infoTramo.duracionTexto = `(${formatearHoras(duracionTotalMin)})`;

        // Guardar minutos acumulados ANTES de sumar este tramo
        infoTramo.minutosAcumulados = minutosAcumulados;
        
        // Ahora sí, sumar este tramo al acumulado
        minutosAcumulados += duracionTotalMin;

        infoTramo.horaLlegada = sumarMinutosAHora(salidaSeleccionada, infoTramo.minutosAcumulados);
        infoTramo.horaSalida = sumarMinutosAHora(salidaSeleccionada, infoTramo.minutosAcumulados + duracionTotalMin);
        
        // Acumular totales
        totalDistancia += infoTramo.distanciaValor;
        // duracionTotalMin = minGoogle + minCampo + comidaExtra
        totalDuracion += duracionTotalMin * 60;
        


        if (i < paradas.length - 1) {
            const item = datos[i - 1];
            const li = document.createElement("li");

            // Necesario para Sortable
            li.dataset.id = i - 1;

                let html = `
                    <strong>${i}.</strong>
                
                    <input type="text" class="direccion-editable" 
                           value="${item.direccion}" 
                           style="width: 70%; margin-bottom: 5px;">
                
                    <button class="btn-eliminar" 
                            style="margin-left: 10px; color: white; background: red; border: none; padding: 4px 8px; cursor: pointer;">
                        X
                    </button>
                
                    <input type="number" class="tiempo-extra" 
                           value="${item.minutos ?? 60}" 
                           min="0" 
                           style="width:60px; margin-left:10px;"> min
                
                <label style="margin-left:10px;">
                    <input type="radio"
                           name="comida"
                           class="radio-comida"
                           data-waschecked="${item.comida ? "true" : "false"}"
                           ${item.comida ? "checked" : ""}>
                    Comida
                </label>
                    <br>
                `;


            if (i === 1) {
                html += `<span class="dist"><strong>Desde Valencina → primera:</strong> ${infoTramo.distanciaTexto} (${infoTramo.duracionTexto})</span>`;
            } else {
                html += `<span class="dist"><strong>Desde la anterior:</strong> ${infoTramo.distanciaTexto} (${infoTramo.duracionTexto})</span>`;
            }

            li.innerHTML = html;

                // Cambiar color si esta dirección tiene comida marcada
                if (item.comida === true) {
                    li.style.backgroundColor = "#ffe6b3";   // color suave para comida
                } else {
                    li.style.backgroundColor = "";          // color por defecto
                }

                
            lista.appendChild(li);
        }
    }

    // Último tramo: última dirección → Valencina
    const infoUltimo = await calcularTramo(paradas[paradas.length - 2], paradas[paradas.length - 1]);
        // Acumular totales del último tramo
        totalDistancia += infoUltimo.distanciaValor;
        
        // duracionTotalMinUltimo = minGoogle + minCampo + comidaExtra del último tramo
        const duracionTotalMinUltimo = Math.round(infoUltimo.duracionValor / 60);
        
        // Sumar SOLO lo que aparece entre paréntesis
        totalDuracion += duracionTotalMinUltimo * 60;

        infoUltimo.duracionTexto = formatearHoras(duracionTotalMinUltimo);

    const liUltimo = document.createElement("li");
    liUltimo.innerHTML = `
        <strong>Vuelta a Valencina:</strong> ${infoUltimo.distanciaTexto} (${infoUltimo.duracionTexto})
    `;
    lista.appendChild(liUltimo);

    // Sumar tiempos extra
    let totalExtraMin = 0;
    document.querySelectorAll(".tiempo-extra").forEach(input => {
        totalExtraMin += parseInt(input.value) || 0;
    });
    
    // Convertir minutos extra a segundos
    //totalDuracion += totalExtraMin * 60;


    // Totales
    const totalKm = (totalDistancia / 1000).toFixed(2);
    const horas = Math.floor(totalDuracion / 3600);
    const minutos = Math.floor((totalDuracion % 3600) / 60);

    const liTotal = document.createElement("li");
    liTotal.innerHTML = `
        <strong>Total Km:</strong> ${totalKm} km<br>
        <strong>Total Tiempo:</strong> ${horas} h ${minutos} min
    `;
    liTotal.style.background = "#dff0d8";
    liTotal.style.padding = "10px";
    liTotal.style.marginTop = "10px";
    liTotal.style.border = "2px solid #b2d8b2";

    lista.appendChild(liTotal);

    // -----------------------------
    // GEOCODIFICACIÓN Y MAPA
    // -----------------------------

    const coordenadasRuta = [];
    const bounds = new google.maps.LatLngBounds();

    // Geocodificar direcciones
    await Promise.all(
        datos.map((item, idx) => {
            return new Promise((resolve) => {
                geocoder.geocode({ address: item.direccion }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        const pos = results[0].geometry.location;
                        coordenadasRuta[idx] = pos;

                        const marker = new google.maps.Marker({
                            map,
                            position: pos,
                            label: String(idx + 1),
                            title: item.direccion,
                        });

                        markers.push(marker);
                        bounds.extend(pos);
                    }
                    resolve();
                });
            });
        })
    );

    // Geocodificar Valencina
    await new Promise((resolve) => {
        geocoder.geocode({ address: ORIGEN_FIJO }, (results, status) => {
            if (status === "OK" && results[0]) {
                const origen = results[0].geometry.location;
                coordenadasRuta.unshift(origen);
                coordenadasRuta.push(origen);
                bounds.extend(origen);
                dibujarRutaCompleta(coordenadasRuta);
            }
            resolve();
        });
    });

    map.fitBounds(bounds);
}

    // Recalcular
        document.getElementById("btn-recalcular").addEventListener("click", () => {
            const items = document.querySelectorAll("#lista-direcciones li");
        
            const nuevasDirecciones = [];
            let indiceComida = -1;
        
            items.forEach((li, idx) => {
                const dirInput = li.querySelector(".direccion-editable");
                const minInput = li.querySelector(".tiempo-extra");
                const radio = li.querySelector(".radio-comida");
        
                if (!dirInput) return;
        
                nuevasDirecciones.push({
                    direccion: dirInput.value.trim(),
                    minutos: parseInt(minInput.value) || 0,
                    comida: radio ? (radio.dataset.waschecked === "true") : false,
                    comidaExtra: 0
                });
        
                // ✔ CORRECTO: leer el estado REAL del radio
                if (radio && radio.dataset.waschecked === "true") {
                    indiceComida = idx;
                }
            });
        
            // Resetear comidaExtra en todas
            nuevasDirecciones.forEach(d => d.comidaExtra = 0);
        
        // Si hay comida marcada, asignar 60 min a la MISMA dirección
        if (indiceComida !== -1) {
            nuevasDirecciones[indiceComida].comidaExtra = 60;
        }

        
            // Llamar al cálculo con la lista ya corregida
            calcularDistanciasDesdeValencina(nuevasDirecciones);
        });




    // Exportar
    document.getElementById("btn-exportar").addEventListener("click", () => {
    const inputs = document.querySelectorAll(".direccion-editable");

    // Leer direcciones en el orden actual
    const direcciones = Array.from(inputs).map(input => input.value.trim());

    if (direcciones.length === 0) {
        mostrarMensaje("No hay direcciones para exportar", "advertencia");
        return;
    }

    // Construir URL de Google Maps
    const origen = encodeURIComponent(ORIGEN_FIJO);
    const waypoints = direcciones.map(d => encodeURIComponent(d)).join("/");

    const url = `https://www.google.com/maps/dir/${origen}/${waypoints}/${origen}`;

    // Abrir en nueva pestaña
    window.open(url, "_blank");
});

    // --- BOTÓN AÑADIR DIRECCIÓN ---
document.getElementById("btn-anadir").addEventListener("click", () => {
    const lista = document.getElementById("lista-direcciones");

    const nuevoLi = document.createElement("li");
    nuevoLi.innerHTML = `
        <strong>+</strong>
        <input type="text" class="direccion-editable" value="" placeholder="Nueva dirección..." style="width: 90%; margin-bottom: 5px;"><br>
    `;

    lista.appendChild(nuevoLi);
});


// --- ELIMINAR DIRECCIÓN INDIVIDUAL ---
document.addEventListener("click", (e) => {
    if (e.target.classList.contains("btn-eliminar")) {
        const li = e.target.closest("li");
        if (li) {
            li.remove();
        }
    }
});

    // --- PREVISIÓN DEL TIEMPO ---
document.getElementById("btn-clima").addEventListener("click", async () => {
    const fecha = document.getElementById("fecha-clima").value;
    const div = document.getElementById("resultado-clima");

    if (!fecha) {
        div.innerHTML = "<div style='color:red;'>Selecciona una fecha.</div>";
        return;
    }

    div.innerHTML = "⏳ Consultando previsión del tiempo...";

    // Coordenadas de las ciudades
    const ciudades = [
        { nombre: "Sevilla", lat: 37.3891, lon: -5.9845 },
        { nombre: "Cádiz", lat: 36.5271, lon: -6.2886 },
        { nombre: "Huelva", lat: 37.2614, lon: -6.9447 },
        { nombre: "Córdoba", lat: 37.8882, lon: -4.7794 },
        { nombre: "Málaga", lat: 36.7213, lon: -4.4214 }
    ];

    let html = `<h3>Previsión para el ${fecha}</h3>`;

    for (const ciudad of ciudades) {
       const url = `https://api.open-meteo.com/v1/forecast?latitude=${ciudad.lat}&longitude=${ciudad.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid&start_date=${fecha}&end_date=${fecha}`;


        try {
            const resp = await fetch(url);
            const data = await resp.json();

            const code = data.daily.weathercode[0];
            const icono = iconoClima(code);

            const tmax = data.daily.temperature_2m_max[0];
            const tmin = data.daily.temperature_2m_min[0];
            const lluvia = data.daily.precipitation_probability_max[0];

        html += `
            <div class="tarjeta-clima">
                <strong>${ciudad.nombre}</strong><br>
                ${icono}<br>
                🌡️ Máx: ${tmax}°C — Mín: ${tmin}°C<br>
                🌧️ Probabilidad de lluvia: ${lluvia}%
            </div>
        `;

        } catch (e) {
            html += `<div style="color:red;">Error obteniendo datos para ${ciudad.nombre}</div>`;
        }
    }

    div.innerHTML = `<div id="clima-contenedor">${html}</div>`;

});



</script>

<script>
document.addEventListener("click", function(e) {
    if (!e.target.classList.contains("radio-comida")) return;

    const yaMarcado = e.target.checked && e.target.dataset.waschecked === "true";

    // Resetear estado previo de todos
    document.querySelectorAll(".radio-comida").forEach(r => {
        r.dataset.waschecked = "false";
    });

    if (yaMarcado) {
        e.target.checked = false;
        e.target.dataset.waschecked = "false";
    } else {
        e.target.checked = true;
        e.target.dataset.waschecked = "true";
    }
});
</script>
